<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poker V3</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🃏 Poker V3</h1>
    <p class="subtitle">Free GitHub Pages + Firebase Multiplayer Poker</p>

    <div class="card">
      <h2>Join / Create Room</h2>

      <label for="nameInput">Your Name</label>
      <input type="text" id="nameInput" placeholder="Enter your name" />

      <label for="roomInput">Room Code</label>
      <div class="room-row">
        <input type="text" id="roomInput" placeholder="Enter room code" />
        <button id="randomRoomBtn">Random Room</button>
      </div>

      <label for="playerCountInput">Players Needed To Start (2–6)</label>
      <input type="number" id="playerCountInput" min="2" max="6" value="2" />

      <div class="button-row">
        <button id="joinBtn">Create / Join Room</button>
        <button id="startBtn">Start Game</button>
      </div>
    </div>

    <div class="card">
      <h2>Game Status</h2>
      <p id="statusText">Not connected</p>
      <p id="currentRoom">Room: None</p>
      <p id="potText">Pot: 0</p>
      <p id="turnText">Current Turn: None</p>
    </div>

    <div class="card">
      <h2>Community Cards</h2>
      <div id="communityCards" class="cards-area">
        <p class="empty-state">No community cards yet</p>
      </div>
    </div>

    <div class="card">
      <h2>Your Hand</h2>
      <div id="yourHand" class="cards-area">
        <p class="empty-state">Join a room first</p>
      </div>
    </div>

    <div class="card">
      <h2>Actions</h2>
      <div class="button-row">
        <button id="checkBtn">Check</button>
        <button id="callBtn">Call</button>
        <button id="betBtn">Bet 10</button>
        <button id="foldBtn" class="danger">Fold</button>
      </div>
    </div>

    <div class="card">
      <h2>Players</h2>
      <div id="playersList" class="players-list">
        <p class="empty-state">No players yet</p>
      </div>
    </div>

    <div class="card">
      <h2>Winner</h2>
      <p id="winnerText">No winner yet</p>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
